<!DOCTYPE html>
<html>

<head>
  <style>
    p {
      color: #424346;
      font-size: 12px;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      margin-left: 20px
    }

    input[type=submit] {
      background-color: #006fc0;
      color: white;
      font-size: 14px;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      border: 1px solid #0e589c;
      border-radius: 8px;
      cursor: pointer;
      width: 100px;
      height: 45px;
      margin-left: 20px;
    }

    .cancel {
      background-color: #e2e9f1;
      color: #424346;
      font-size: 14px;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 115px;
      height: 45px;
      margin-left: 20px;
    }

    .addanswer {
      background-color: white;
      border: none;
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
      cursor: pointer;
      color: #2a6ca0;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      margin-left: 10px;
    }

    .x {
      border: none;
      background: none;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      padding: 6px 12px;
      font-size: 18px;
    }

    /* The box */
    input[type="text"] {
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #d7dbde;
      color: #4e504f;
      font-family: Lato, Lucida Sans Unicode, Lucida Grande, sans-serif;
      margin-left: 5px;
      
    }

    /* The container */
    .container {
      display: block;
      position: relative;
      padding-left: 35px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 22px;
    }

    /* Hide the browser's default radio button */
    .container input[type="radio"] {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    /* Create a custom radio button */
    .checkmark {
      border: 1px solid black;
      position: absolute;
      left: 0;
      height: 25px;
      width: 25px;
      background-color: #f2f3fd;
      border-radius: 45%;
      border-color: #ced4d9;
      margin-left: 15px;
    }

    /* When the radio button is checked, add a blue background */
    .container input:checked~.checkmark {
      background-color: #f2f3fd;
      border-color: #ced4d9;
    }

    /* Create the indicator (the dot/circle - hidden when not checked) */
    .checkmark:after {
      content: "";
      position: absolute;
      display: none;
    }

    /* Show the indicator (dot/circle) when checked */
    .container input:checked~.checkmark:after {
      display: block;
      width: 11px;
      height: 11px;
      top: 7px;
      left: 7px;
    }

    /* Style the indicator (dot/circle) */
    .container .checkmark:after {
      top: 9px;
      left: 9px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border-color: #ced4d9;
    }

    /* Style the indicator (dot) */
    .container .checkmark:after {
      top: 9px;
      left: 9px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #565a5d;
      border-color: #ced4d9;
    }
    }
  </style>
</head>

<body>
